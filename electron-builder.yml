appId: com.radvoice.local
productName: RadVoice
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - from: models/
    to: models/
    filter:
      - "**/*.bin"
  - from: templates/
    to: templates/
    filter:
      - "**/*.json"
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.medical
